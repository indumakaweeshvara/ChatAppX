services:
  - type: web
    name: solaris-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solaris-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: solaris-db
    plan: free
